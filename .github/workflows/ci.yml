name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard — no committed .env
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is committed — remove it and rotate any exposed secrets"
            exit 1
          fi
          echo "ok: no .env in the index"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/ config/ scripts/

      - name: Type check (mypy)
        run: mypy src/ config/

      - name: Unit tests + coverage gate
        run: pytest tests/unit/ -v --cov=src/signals --cov-report=term-missing

      - name: Security audit (pip-audit)
        run: pip-audit || true   # advisory: report but do not block on transitive CVEs
