name: CI

on:
  push:
    branches: [main] # post-merge runs on main only
  pull_request:
    branches: [main] # feature branches are covered by their PR (avoids double runs)

# Needed so the test-results action can publish a Check + PR comment.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard — no committed .env
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is committed — remove it and rotate any exposed secrets"
            exit 1
          fi
          echo "ok: no .env in the index"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e . --no-deps   # make src/ and config/ importable for mypy & pytest

      - name: Lint (ruff)
        run: ruff check src/ tests/ config/ scripts/

      - name: Type check (mypy)
        run: mypy src/ config/

      - name: Unit tests (coverage gate + JUnit report)
        run: |
          pytest tests/unit/ -v --junitxml=junit.xml \
            --cov=src/signals --cov-report=term-missing --cov-report=xml

      - name: Publish test results to GitHub
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # publish even when tests fail, so results are always visible
        with:
          files: junit.xml
          check_name: "Unit test results"
          comment_mode: always

      - name: Upload test & coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: ignore

      - name: Security — bandit (Python SAST, medium+ severity)
        run: bandit -r src/ -ll

      - name: Security — pip-audit (dependency CVEs)
        if: always()
        run: pip-audit || true # advisory: report but do not block on transitive CVEs
