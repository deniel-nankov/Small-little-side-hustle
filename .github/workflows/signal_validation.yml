name: Signal validation

# Runs when a signal's construction code changes. Runs the 7-test validation suite on the
# changed signal and posts the IC / ICIR results back to the PR. Fails the check if the
# signal does not pass all 7 tests.

on:
  pull_request:
    paths:
      - "src/signals/construction/**"
      - "src/signals/validation/**"

jobs:
  validate-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Milestone 3 wires this to backtest_runner over the changed signal and emits a
      # markdown table. Until then it is a placeholder that documents the contract.
      - name: Run 7-test validation suite
        run: |
          echo "TODO (Milestone 3): run src/signals/validation/backtest_runner.py on the"
          echo "changed signal; fail if passed_validation is false; print mean_ic / icir."

      - name: Post results to PR
        if: always()
        run: |
          echo "TODO (Milestone 3): post IC/ICIR table as a PR comment."
