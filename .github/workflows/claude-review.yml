name: Claude review

# Automatic LLM review of every PR for compliance / security / flow. Activates once the
# repo secret ANTHROPIC_API_KEY is set; until then the job skips cleanly (green, no review).
# NOTE: verify the action inputs against the current anthropics/claude-code-action README
# when you enable it — the input names can change between major versions.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Detect API key
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping Claude review (add the secret to enable)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Claude compliance / security / flow review
        if: steps.gate.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for an institutional trading research platform. Act as three
            small, focused reviewers and post ONE concise summary with concrete file:line
            findings only (no praise, no restating the diff):
            1) COMPLIANCE — point-in-time data only; no outcome/look-ahead leakage;
               train/test discipline; audit logging of decisions; secrets only via
               config.settings.
            2) SECURITY — input validation at module boundaries; no hardcoded secrets;
               safe SQL/file handling; risky dependencies.
            3) FLOW — data flows downward only (data -> signals -> validation ->
               combination -> portfolio -> execution) with no upward imports; Pydantic
               contracts used at every module boundary.
