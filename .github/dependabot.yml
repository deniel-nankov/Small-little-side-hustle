version: 2
updates:
  # Python dependencies (requirements*.txt + pyproject).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["infra", "security"]

  # GitHub Actions versions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["infra"]
